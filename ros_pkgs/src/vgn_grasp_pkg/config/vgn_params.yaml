vgn_grasp_node:
  ros__parameters:
    # ROI cube side length (m) — must match VGN model training size
    roi_size_m: 0.30

    # TSDF voxel grid side count — fixed, matches VGN input shape (40x40x40)
    tsdf_resolution: 40

    # VGN weight file path (relative to ROBOT_CAPSTONE_ROOT, or absolute)
    vgn_model_path: "models/vgn_conv.pth"

    # Grasp quality lower bound for NMS
    min_quality: 0.5

    # Skip trigger if TARGET point_count is below this
    min_point_count: 50

    # Use top camera depth for TSDF integration (set false to use EE only)
    use_top_depth: true

    # Trigger and output topics
    world_map_result_topic: "/world_map_result"
    grasp_candidates_topic: "/grasp_candidates"

    # The following come from robot_defaults.yaml (loaded first by launch):
    #   max_grasp_candidates  — max Top-K candidates to publish
    #   ee_depth_topic / ee_camera_info_topic
    #   top_depth_topic / top_camera_info_topic
    #   extrinsics_config
    #   world_frame / robot_frame
